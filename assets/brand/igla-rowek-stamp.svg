  <circle cx="512" cy="512" r="224" stroke="#E6D08A" stroke-opacity="0.09" stroke-width="2"/>

  <circle cx="512" cy="512" r="202" fill="url(#brass)"/>
  <circle cx="512" cy="512" r="178" fill="url(#paper)" opacity="0.92"/>
