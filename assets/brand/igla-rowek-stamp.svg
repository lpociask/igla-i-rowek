  <text x="512" y="586" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="850" letter-spacing="4.2" fill="#171008">IGŁA I ROWEK</text>
  <text x="512" y="633" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="760" letter-spacing="1.2" fill="#0D595F">IGŁĄ W ROWEK</text>

