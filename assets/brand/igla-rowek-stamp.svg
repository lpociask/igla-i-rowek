<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Igla i Rowek analog stamp logo</title>
  <desc>Analog stamp logo with vinyl grooves, brass label, I&amp;R monogram, and a tonearm needle touching the groove.</desc>
  <defs>
    <radialGradient id="vinyl" cx="50%" cy="44%" r="58%">
      <stop offset="0%" stop-color="#231D15"/>
      <stop offset="55%" stop-color="#11100D"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="brass" x1="236" y1="204" x2="760" y2="824" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2C56D"/>
      <stop offset="42%" stop-color="#C79145"/>
      <stop offset="100%" stop-color="#6F451E"/>
    </linearGradient>
    <linearGradient id="paper" x1="304" y1="262" x2="742" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1E2A6"/>
      <stop offset="100%" stop-color="#C9A44F"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="468" fill="#0E0C0A"/>
